# Example secret. DO NOT COMMIT A FILLED-IN COPY OF THIS FILE.
#
# Usage:
#   cp k8s/99-secrets.example.yaml k8s/99-secrets.yaml
#   # edit k8s/99-secrets.yaml, paste your Gemini API key
#   kubectl apply -f k8s/99-secrets.yaml
#
# k8s/99-secrets.yaml is gitignored via the existing .env rule pattern; if
# you're worried, also add `k8s/99-secrets.yaml` to .gitignore explicitly.
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: sceneagent
type: Opaque
stringData:
  GEMINI_API_KEY: "REPLACE_ME_WITH_YOUR_GEMINI_KEY"
