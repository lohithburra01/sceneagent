name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: api (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint api/src
        run: ruff check api/src/

  web:
    name: web (tsc + next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build-time placeholder; runtime value is injected by k8s/compose.
          NEXT_PUBLIC_API_URL: http://localhost:8000
